name: Update Stock Data

on:
  schedule:
    - cron: '0 * * * 1-5'    # every hour on weekdays
  workflow_dispatch:           # also triggered by the watchlist API when you add/remove a ticker

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run stock script
        run: python "Python Script/Stock Script.py"

      - name: Copy data to web dashboard
        run: cp "Python Script/stock_data.json" "web-dashboard/public/stock_data.json"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Python Script/config.json" "web-dashboard/public/stock_data.json"
          git diff --cached --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
