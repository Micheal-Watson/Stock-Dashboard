name: Update Stock Data

on:
  schedule:
    - cron: '0 21 * * 1-5'  # 4pm ET (9pm UTC), weekdays only
  workflow_dispatch:          # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy requests

      - name: Run stock script
        run: python "Python Script/Stock Script.py"
        working-directory: ${{ github.workspace }}

      - name: Copy data to web dashboard
        run: cp "Python Script/stock_data.json" "web-dashboard/public/stock_data.json"

      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add web-dashboard/public/stock_data.json
          git diff --cached --quiet || git commit -m "chore: update stock data $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
